name: .NET Build & Test

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          include-prerelease: true

      - name: Restore dependencies
        run: dotnet restore ScalableTcpDeviceGateway.sln

      - name: Build
        run: dotnet build ScalableTcpDeviceGateway.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test Gateway.Protocol.Tests/Gateway.Protocol.Tests.csproj --configuration Release --no-build --verbosity normal