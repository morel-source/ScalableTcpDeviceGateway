global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: "gateway-app"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:2222"] # need to change if changed in gateway app configurations
        labels:
          app: gateway

  - job_name: "simulator-app"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:3333"] # need to change if changed in simulator configurations
        labels:
          app: simulator
